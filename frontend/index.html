<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SQL Assistant</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════════
     AUTH PAGE
════════════════════════════════════════════════════════════════ -->
<div id="auth-page">
  <div class="auth-box">

    <div class="auth-logo">
      <!-- <div class="auth-logo-mark">⚡</div> -->
      <div class="auth-logo-name">SQL Assistant</div>
    </div>

    <div id="auth-alert" class="auth-alert hidden"></div>

    <!-- Login form -->
    <div id="login-form">
      <div class="auth-title">Sign in</div>
      <div class="auth-sub">Welcome back</div>

      <div class="field">
        <label for="login-email">Email</label>
        <input id="login-email" type="email" placeholder="you@example.com"
               autocomplete="email" />
      </div>
      <div class="field">
        <label for="login-password">Password</label>
        <input id="login-password" type="password" placeholder="••••••••"
               autocomplete="current-password"
               onkeydown="if(event.key==='Enter') handleLogin()" />
      </div>

      <button id="login-btn" class="btn btn-primary" onclick="handleLogin()">
        Sign in
      </button>

      <div class="auth-switch">
        No account?
        <button onclick="showRegisterForm()">Create one</button>
      </div>
    </div>

    <!-- Register form -->
    <div id="register-form" class="hidden">
      <div class="auth-title">Create account</div>
      <div class="auth-sub">Get started for free</div>

      <div class="field">
        <label for="reg-name">Full name</label>
        <input id="reg-name" type="text" placeholder="Het Patel"
               autocomplete="name" />
      </div>
      <div class="field">
        <label for="reg-email">Email</label>
        <input id="reg-email" type="email" placeholder="you@example.com"
               autocomplete="email" />
      </div>
      <div class="field">
        <label for="reg-password">Password</label>
        <input id="reg-password" type="password" placeholder="Minimum 6 characters"
               autocomplete="new-password" />
      </div>

      <button id="register-btn" class="btn btn-primary" onclick="handleRegister()">
        Create account
      </button>

      <div class="auth-switch">
        Already have an account?
        <button onclick="showLoginForm()">Sign in</button>
      </div>
    </div>

  </div>
</div>


<!-- ═══════════════════════════════════════════════════════════════
     APP PAGE
════════════════════════════════════════════════════════════════ -->
<div id="app-page" class="hidden">

  <!-- ── SIDEBAR ── -->
  <aside class="sidebar">

    <div class="sidebar-head">
      <div class="sidebar-logo">
        <!-- <div class="sidebar-logo-mark">⚡</div> -->
        <div class="sidebar-logo-name">SQL Assistant</div>
      </div>
      <button class="btn-add-schema" onclick="openSchemaModal()">
        <span>+</span> Add schema
      </button>
    </div>

    <div class="sidebar-section-label">Schemas</div>

    <div id="schema-list" class="schema-list">
      <div class="schema-empty">No schemas yet.</div>
    </div>

    <div class="sidebar-foot">
      <div class="user-row">
        <div id="user-avatar" class="user-avatar">U</div>
        <div id="user-label" class="user-label">User</div>
        <button class="btn-logout" onclick="handleLogout()">Sign out</button>
      </div>
    </div>

  </aside>

  <!-- ── MAIN ── -->
  <div class="main">

    <!-- Topbar -->
    <div class="topbar">
      <div class="topbar-title">
        <span id="topbar-title">No schema selected</span>
        <span id="topbar-platform" class="topbar-platform hidden"></span>
      </div>
      <button class="btn btn-ghost" onclick="handleClearHistory()"
              style="font-size:12px;padding:6px 12px;">
        Clear history
      </button>
      <button class="btn btn-ghost" onclick="showEmptyState(!!activeSchemaId)"
              style="font-size:12px;padding:6px 12px;">
        New chat
      </button>
    </div>

    <!-- Chat area -->
    <div class="chat-area">
      <div id="chat-inner" class="chat-inner"></div>
    </div>

    <!-- Composer -->
    <div class="composer">
      <div class="composer-inner">
        <div class="composer-box">
          <textarea
            id="composer-input"
            placeholder="Ask anything about your database…"
            rows="1"
          ></textarea>
          <button id="send-btn" class="btn-send" onclick="handleSend()" disabled>
            ➤
          </button>
        </div>
        <div class="composer-hint">Enter to send · Shift+Enter for new line</div>
      </div>
    </div>

  </div>
</div>


<!-- ═══════════════════════════════════════════════════════════════
     ADD SCHEMA MODAL
════════════════════════════════════════════════════════════════ -->
<div id="schema-modal" class="modal-overlay hidden"
     onclick="if(event.target===this) closeSchemaModal()">
  <div class="modal-box">

    <div class="modal-head">
      <div class="modal-title">Add schema</div>
      <button class="btn-modal-close" onclick="closeSchemaModal()">✕</button>
    </div>

    <!-- Schema name -->
    <div class="field">
      <label for="modal-schema-name">Schema name</label>
      <input id="modal-schema-name" type="text" placeholder="e.g. ecommerce_db" />
    </div>

    <!-- Platform -->
    <div class="field">
      <label>Platform</label>
      <div class="platform-row">
        <button class="platform-btn active" data-platform="postgresql">PostgreSQL</button>
        <button class="platform-btn" data-platform="mysql">MySQL</button>
        <button class="platform-btn" data-platform="sqlite">SQLite</button>
        <button class="platform-btn" data-platform="sqlserver">SQL Server</button>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tab-row">
      <button class="tab-btn active" data-tab="tab-paste">Paste DDL</button>
      <button class="tab-btn" data-tab="tab-connect">Connect database</button>
    </div>

    <!-- Paste DDL tab -->
    <div id="tab-paste" class="tab-panel active">
      <div class="field">
        <label for="modal-ddl">CREATE TABLE statements</label>
        <textarea id="modal-ddl"
          placeholder="CREATE TABLE users (&#10;    id SERIAL PRIMARY KEY,&#10;    name VARCHAR(100),&#10;    email VARCHAR(100)&#10;);"></textarea>
      </div>
    </div>

    <!-- Connect database tab -->
    <div id="tab-connect" class="tab-panel">
      <div class="form-grid">
        <div class="field">
          <label for="modal-db-host">Host</label>
          <input id="modal-db-host" type="text" value="localhost" />
        </div>
        <div class="field">
          <label for="modal-db-port">Port</label>
          <input id="modal-db-port" type="number" value="5432" />
        </div>
      </div>
      <div class="field">
        <label for="modal-db-name">Database name</label>
        <input id="modal-db-name" type="text" placeholder="my_database" />
      </div>
      <div class="form-grid">
        <div class="field">
          <label for="modal-db-user">Username</label>
          <input id="modal-db-user" type="text" placeholder="postgres" />
        </div>
        <div class="field">
          <label for="modal-db-pass">Password</label>
          <input id="modal-db-pass" type="password" placeholder="••••••••" />
        </div>
      </div>
    </div>

    <!-- Error message -->
    <div id="modal-error" class="auth-alert error hidden"></div>

    <!-- Footer -->
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeSchemaModal()">Cancel</button>
      <button id="modal-save-btn" class="btn btn-primary"
              style="width:auto;" onclick="handleSaveSchema()">Save</button>
    </div>

  </div>
</div>


<!-- Scripts — order matters -->
<script src="api.js"></script>
<script src="ui.js"></script>
<script src="app.js"></script>

</body>
</html>
